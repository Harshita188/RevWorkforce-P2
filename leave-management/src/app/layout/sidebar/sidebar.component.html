<div class="flex flex-col h-full w-64 bg-white border-r border-slate-200">
  <!-- Logo -->
  <div class="p-6">
    <div class="flex items-center space-x-3">
      <div class="w-10 h-10 bg-primary-600 rounded-xl flex items-center justify-center text-white">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"
          class="w-6 h-6">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z" />
        </svg>
      </div>
      <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary-600 to-primary-800">HRM
        Portal</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-4 space-y-2 mt-4">
    @for (item of menuItems; track item.label) {
    <a [routerLink]="item.route" routerLinkActive="bg-primary-50 text-primary-700 font-semibold"
      [routerLinkActiveOptions]="{exact: true}"
      class="flex items-center px-4 py-3 text-slate-600 rounded-xl transition-all hover:bg-slate-50 hover:text-primary-600 group">

      <span class="mr-3">
        @if (item.icon === 'dashboard') {
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="w-5 h-5 transition-colors group-hover:text-primary-600">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25a2.25 2.25 0 01-2.25-2.25v-2.25z" />
        </svg>
        }
        @if (item.icon === 'add_circle') {
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="w-5 h-5 transition-colors group-hover:text-primary-600">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        }
        @if (item.icon === 'list') {
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="w-5 h-5 transition-colors group-hover:text-primary-600">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
        </svg>
        }
        @if (item.icon === 'pending_actions') {
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
          class="w-5 h-5 transition-colors group-hover:text-primary-600">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 17l2 2 4-4" />
        </svg>
        }
      </span>

      <span>{{item.label}}</span>
    </a>
    }
  </nav>

  <!-- User Info / Logout -->
  <div class="p-4 border-t border-slate-100 mb-4">
    <div class="flex items-center p-3 mb-2">
      <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 font-bold">
        {{user()?.name?.charAt(0)}}
      </div>
      <div class="ml-3 overflow-hidden">
        <p class="text-sm font-semibold text-slate-800 truncate">{{user()?.name}}</p>
        <p class="text-xs text-slate-500 capitalize">{{user()?.role?.toLowerCase()}}</p>
      </div>
    </div>
    <button (click)="authService.logout()"
      class="w-full flex items-center px-4 py-3 text-slate-600 rounded-xl hover:bg-red-50 hover:text-red-600 transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
        class="w-5 h-5 mr-3">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75" />
      </svg>
      <span>Logout</span>
    </button>
  </div>
</div>
