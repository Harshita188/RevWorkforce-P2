services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: revworkforce
      MYSQL_ROOT_PASSWORD: Hysqlpassword1234
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "taskuser", "-ptaskpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./revworkforce/revworkforce
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/revworkforce
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Hysqlpassword1234
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./rev-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: