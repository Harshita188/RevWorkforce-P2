<header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-10">
    <div>
        <h2 class="text-lg font-semibold text-slate-800">Welcome, {{user()?.name}}!</h2>
        <p class="text-xs text-slate-500">{{getCurrentDate()}}</p>
    </div>

    <div class="flex items-center space-x-4">
        <!-- Notifications -->
        <button class="p-2 text-slate-400 hover:text-primary-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round"
                    d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
            </svg>
        </button>

        <div class="h-8 w-px bg-slate-200"></div>

        <div class="flex items-center">
            <div
                class="w-8 h-8 rounded-lg bg-primary-100 flex items-center justify-center text-primary-700 font-bold text-sm">
                {{user()?.name?.charAt(0)}}
            </div>
            <span class="ml-2 text-sm font-medium text-slate-700 hidden sm:block">{{user()?.role}}</span>
        </div>
    </div>
</header>
