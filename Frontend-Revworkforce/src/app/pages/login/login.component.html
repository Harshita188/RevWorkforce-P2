<div class="min-h-screen flex items-center justify-center bg-slate-50 p-4 font-['Inter']">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div
                class="inline-flex items-center justify-center w-12 h-12 bg-primary-600 rounded-xl text-white mb-4 shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2"
                    stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 21v-8.25M15.75 21v-8.25M8.25 21v-8.25M3 9l9-6 9 6m-1.5 12V10.332A48.36 48.36 0 0012 9.75c-2.551 0-5.056.2-7.5.582V21M3 21h18M12 6.75h.008v.008H12V6.75z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900">Sign in to HRM</h1>
            <p class="text-slate-500 mt-1 text-sm">Welcome back! Please enter your details.</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-100">
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
                    <input type="email" formControlName="email"
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:bg-white outline-none transition-all text-sm"
                        placeholder="Enter your email">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                    <input type="password" formControlName="password"
                        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-primary-500 focus:bg-white outline-none transition-all text-sm"
                        placeholder="••••••••">
                </div>

                @if (error) {
                <div class="p-3 bg-red-50 border border-red-100 rounded-lg text-xs text-red-600 font-medium">
                    {{error}}
                </div>
                }

                <button type="submit" [disabled]="loading"
                    class="w-full py-2.5 bg-primary-600 hover:bg-primary-700 text-white font-bold rounded-lg transition-all disabled:opacity-50 text-sm">
                    @if (loading) {
                    <span>Signing in...</span>
                    } @else {
                    <span>Sign In</span>
                    }
                </button>

                <div class="pt-6 border-t border-slate-100 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase mb-3">Quick Access</p>
                    <div class="flex space-x-2 text-[10px]">
                        <div class="flex-1 p-2 bg-slate-50 rounded border border-slate-100">
                            <span class="block text-slate-400">MANAGER</span>
                            <span class="font-mono text-slate-600">admin&#64;hrm.com</span>
                        </div>
                        <div class="flex-1 p-2 bg-slate-50 rounded border border-slate-100">
                            <span class="block text-slate-400">EMPLOYEE</span>
                            <span class="font-mono text-slate-600">user&#64;hrm.com</span>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
